name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, pdo_sqlite, zip, xml, dom, curl, mbstring
          coverage: none

      - name: Create .env file for testing
        run: |
          cat > .env.local << 'EOF'
          APP_ENV=test
          APP_SECRET=test-secret-key-for-ci
          API_SECRET_KEY=test-api-key-12345
          EOF

      - name: Create var directory
        run: mkdir -p var

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Start MySQL
        run: |
          docker compose up -d mysql
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if docker compose exec -T mysql mysqladmin ping -h localhost -u root -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --configuration phpunit.xml.dist

      - name: Stop MySQL
        if: always()
        run: docker compose down
