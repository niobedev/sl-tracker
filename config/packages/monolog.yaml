monolog:
    channels:
        - notification
    handlers:
        main:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            channels: ["!event", "!doctrine", "!notification"]
        notification:
            type: stream
            path: "%kernel.logs_dir%/notification.log"
            level: info
            channels: [notification]
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console"]
